{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Room: {{ room_name }}</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
      .head { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
      .muted { opacity: .7 }
      #members { background: #f6f6f6; padding: 10px; border-radius: 8px; }
      #log { height: 60vh; border: 1px solid #ccc; border-radius: 6px; overflow-y: auto; padding: 10px; margin-top: 12px; }
      .bubble { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; margin: 6px 0; }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      input { flex: 1; padding: 8px 10px; }
    </style>
  </head>
  <body>
    <div class="head">Room: {{ room_name }}</div>
    <div class="muted">Signed in as <strong>{{ username }}</strong> <span id="state">(connecting…)</span></div>
    <p><a href="{% url 'index' %}">Home</a></p>

    <div id="members">In room: <span id="who">—</span></div>
    <div id="log"></div>

    <div class="row">
      <input id="msg" placeholder="Type a message…" />
      <button id="send">Send</button>
    </div>

    <script>
      // --- DOM refs ---
      const stateEl = document.getElementById('state');
      const whoEl   = document.getElementById('who');
      const logEl   = document.getElementById('log');
      const inputEl = document.getElementById('msg');
      const sendBtn = document.getElementById('send');

      function addLine(html) {
        const div = document.createElement('div');
        div.className = 'bubble';
        div.innerHTML = html;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      // --- WebSocket ---
      const roomName = "{{ room_name }}"; // e.g. 1234
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      // IMPORTANT: trailing slash to match routing.py
      const wsUrl = `${proto}://${location.host}/ws/chat/${roomName}/`;
      const ws = new WebSocket(wsUrl);

      ws.onopen  = () => { stateEl.textContent = '(open)';   };
      ws.onclose = () => { stateEl.textContent = '(closed)'; };
      ws.onerror = () => { stateEl.textContent = '(closed)'; };

      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'history') {
          for (const it of msg.items) {
            addLine(`<strong>${it.username}</strong>: ${it.content}`);
          }
        } else if (msg.type === 'chat.message') {
          addLine(`<strong>${msg.username}</strong>: ${msg.content}`);
        } else if (msg.type === 'presence') {
          whoEl.textContent = msg.members.length ? msg.members.join(', ') : '—';
        } else if (msg.type === 'system') {
          addLine(`<em>${msg.username} ${msg.event}ed</em>`);
        }
      };

      function send() {
        const text = inputEl.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'chat.message', content: text }));
        inputEl.value = '';
      }

      sendBtn.addEventListener('click', send);
      inputEl.addEventListener('keydown', (e) => e.key === 'Enter' && send());
    </script>
  </body>
</html>
