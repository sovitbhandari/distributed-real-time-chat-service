apiVersion: apps/v1
kind: Deployment
metadata:
  name: djchat
  namespace: djchat
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: djchat }
  template:
    metadata:
      labels: { app: djchat }
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: YOUR_REGISTRY/djchat:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: djchat-config }
            - secretRef:    { name: djchat-secrets }
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
